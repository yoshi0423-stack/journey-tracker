<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid dots for texture -->
  <g opacity="0.06">
    <circle cx="80" cy="80" r="2.5" fill="#fff"/>
    <circle cx="160" cy="80" r="2.5" fill="#fff"/>
    <circle cx="240" cy="80" r="2.5" fill="#fff"/>
    <circle cx="320" cy="80" r="2.5" fill="#fff"/>
    <circle cx="400" cy="80" r="2.5" fill="#fff"/>
    <circle cx="80" cy="160" r="2.5" fill="#fff"/>
    <circle cx="400" cy="160" r="2.5" fill="#fff"/>
    <circle cx="80" cy="400" r="2.5" fill="#fff"/>
    <circle cx="160" cy="400" r="2.5" fill="#fff"/>
    <circle cx="240" cy="400" r="2.5" fill="#fff"/>
    <circle cx="320" cy="400" r="2.5" fill="#fff"/>
    <circle cx="400" cy="400" r="2.5" fill="#fff"/>
  </g>

  <!-- Winding route path -->
  <path d="M100,400 C140,360 160,320 190,290 Q220,260 240,240 Q270,200 300,180 Q340,150 370,130"
        fill="none" stroke="#fff" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.3"
        stroke-dasharray="2,14"/>
  <path d="M100,400 C140,360 160,320 190,290 Q220,260 240,240 Q270,200 300,180 Q340,150 370,130"
        fill="none" stroke="#fff" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Start dot (bottom-left) -->
  <circle cx="100" cy="400" r="12" fill="#fff" opacity="0.35"/>
  <circle cx="100" cy="400" r="6" fill="#fff"/>

  <!-- Location pin (top-right, destination) -->
  <g transform="translate(370, 88)">
    <ellipse cx="0" cy="52" rx="12" ry="4" fill="#000" opacity="0.1"/>
    <path d="M0,44 C-24,24 -32,4 -32,-10 A32,32 0 1,1 32,-10 C32,4 24,24 0,44 Z"
          fill="#fff"/>
    <circle cx="0" cy="-10" r="13" fill="#7c3aed"/>
  </g>

  <!-- Walking person (center-left area, clearly separated from path) -->
  <g transform="translate(170, 250)">
    <!-- Head -->
    <circle cx="0" cy="-46" r="18" fill="#fff"/>
    <!-- Body -->
    <rect x="-6" y="-28" width="12" height="44" rx="6" fill="#fff"/>
    <!-- Left arm (swinging back) -->
    <line x1="-4" y1="-20" x2="-28" y2="2" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <!-- Right arm (swinging forward) -->
    <line x1="4" y1="-20" x2="28" y2="-6" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <!-- Left leg (forward stride) -->
    <line x1="-2" y1="14" x2="-22" y2="56" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
    <!-- Right leg (back stride) -->
    <line x1="2" y1="14" x2="22" y2="52" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Small footprints along path (decorative) -->
  <g opacity="0.2" fill="#fff">
    <ellipse cx="280" cy="200" rx="5" ry="8" transform="rotate(-30 280 200)"/>
    <ellipse cx="310" cy="175" rx="5" ry="8" transform="rotate(-35 310 175)"/>
    <ellipse cx="340" cy="152" rx="5" ry="8" transform="rotate(-40 340 152)"/>
  </g>
</svg>